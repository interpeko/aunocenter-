  <text x="120" y="565" fill="#fff" font-family="Georgia, serif" font-size="102">Research with clarity.</text>
  <text x="120" y="675" fill="#ead19d" font-family="Georgia, serif" font-size="102" font-style="italic">Knowledge with purpose.</text>
  <text x="120" y="815" fill="#fff" fill-opacity=".82" font-family="Arial, sans-serif" font-size="34">One World. One Research. One Center of Excellence.</text>
  <circle cx="1700" cy="850" r="90" fill="#fff" fill-opacity=".94"/><path d="M1674 801l78 49-78 49z" fill="#351443"/>
